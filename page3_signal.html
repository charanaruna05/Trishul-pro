<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔱 Trishul Pro — Signal Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Rajdhani',sans-serif;}
:root{--gold:#f5c518;--gold2:#c9a000;--bg:#000;--bg2:#0a0a0a;--bg3:#121212;--bg4:#1a1a1a;--border:#222;--bordergold:#3d3000;--text:#eee;--dim:#888;--green:#00c853;--red:#ff3d3d;--orange:#ff6d00;--blue:#1976d2;}
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden;}
.phone-frame{width:100%;max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);border:2px solid var(--gold);overflow:hidden;position:relative;}
.topbar{flex-shrink:0;background:var(--bg2);border-bottom:2px solid var(--gold);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.tb-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;color:var(--gold);letter-spacing:1.5px;}
.gemini-pill{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--dim);}
.g-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
/* SCANNER GRID */
.scanner-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);border:2px solid var(--gold);margin:4px;overflow:hidden;}
.sc-box{background:var(--bg);border:1px solid #1e1a00;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;position:relative;overflow:hidden;}
.sc-box:active{background:#0d0d00;}
.sc-box::after{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.scn-icon{font-size:26px;filter:drop-shadow(0 0 7px rgba(245,197,24,0.5));line-height:1;}
.scn-tag{font-size:7px;font-weight:700;color:var(--gold);letter-spacing:2px;opacity:0.8;}
.scn-name{font-size:12px;font-weight:700;color:var(--text);text-align:center;line-height:1.2;padding:0 4px;}
.scn-live{display:flex;align-items:center;gap:3px;font-size:8px;color:var(--dim);}
.live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite;}
/* BOTTOM NAV */
.bottom-nav{flex-shrink:0;display:flex;background:var(--bg2);border-top:2px solid var(--gold);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 4px 5px;cursor:pointer;gap:2px;transition:all 0.2s;text-decoration:none;}
.nav-item:active{background:#1a1600;}
.nav-icon{font-size:17px;line-height:1;}
.nav-label{font-size:8px;color:var(--dim);letter-spacing:0.5px;font-weight:700;}
.nav-item.active .nav-label{color:var(--gold);}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 4px var(--gold));}
/* EXIT FAB */
.exit-fab{position:absolute;top:10px;right:10px;width:32px;height:32px;background:linear-gradient(135deg,#8b0000,var(--red));border:2px solid #ff8888;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;z-index:200;box-shadow:0 0 10px rgba(255,61,61,0.4);}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-bg.show{display:flex;}
.modal-box{background:var(--bg2);border:2px solid var(--gold);width:calc(100% - 32px);max-width:380px;padding:14px;max-height:90vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid var(--bordergold);margin-bottom:12px;}
.modal-title{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--gold);letter-spacing:2px;display:flex;align-items:center;gap:8px;}
.modal-close{background:none;border:1px solid var(--border);color:var(--dim);font-size:18px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.stats-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px;}
.sg-box{background:var(--bg3);border:1px solid var(--border);padding:8px 4px;text-align:center;}
.sg-lbl{font-size:7px;color:var(--dim);letter-spacing:1px;margin-bottom:3px;}
.sg-val{font-size:18px;font-weight:700;}
.sv-gold{color:var(--gold);}.sv-green{color:var(--green);}.sv-red{color:var(--red);}.sv-orange{color:var(--orange);}
.ratio-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ratio-bar{flex:1;height:10px;background:#0a0a00;border:1px solid var(--border);overflow:hidden;}
.ratio-fill{height:100%;background:linear-gradient(90deg,var(--green),#00ff7a);transition:width 0.8s;}
.ratio-pct{font-size:12px;font-weight:700;color:var(--green);}
.breakdown-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.bk-box{background:#0a0a00;border:1px solid var(--border);padding:10px;text-align:center;}
.bk-box.buy-box{border-color:#004a20;background:#001a0a;}
.bk-box.sell-box{border-color:#4a0000;background:#1a0000;}
.bk-lbl{font-size:8px;letter-spacing:2px;margin-bottom:4px;}
.bk-box.buy-box .bk-lbl{color:var(--green);}.bk-box.sell-box .bk-lbl{color:var(--red);}
.bk-count{font-size:26px;font-weight:700;}
.bk-box.buy-box .bk-count{color:var(--green);}.bk-box.sell-box .bk-count{color:var(--red);}
.crit-list{display:flex;flex-direction:column;gap:6px;}
.crit-row-in{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);}
.crit-row-in.pass{border-color:var(--green);background:#002a14;}
.crit-name-in{font-size:11px;font-weight:700;}
.crit-val-in{font-size:11px;font-weight:800;color:var(--green);}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bordergold);padding:8px 16px;font-size:11px;color:var(--text);z-index:9999;white-space:nowrap;display:none;}
.toast.show{display:block;}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="exit-fab" onclick="doLogout()" title="Logout">⏻</div>
  <div class="topbar">
    <div class="tb-title">🔱 TRISHUL PRO MASTER</div>
    <div class="gemini-pill"><div class="g-dot"></div><span>AI ACTIVE</span></div>
  </div>
  <div class="scanner-grid" id="scannerGrid"></div>
  <div id="navContainer"></div>
</div>

<!-- SCANNER MODAL -->
<div class="modal-bg" id="scannerModal" onclick="closeModal('scannerModal')">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title"><span id="scModalIcon">⚡</span>&nbsp;<span id="scModalName">BRAHMASTRA</span></div>
      <button class="modal-close" onclick="closeModal('scannerModal')">✕</button>
    </div>
    <div style="font-size:8px;color:var(--dim);letter-spacing:2px;margin-bottom:6px">📅 TODAY'S PERFORMANCE</div>
    <div class="stats-grid4">
      <div class="sg-box"><div class="sg-lbl">TOTAL</div><div class="sg-val sv-gold" id="scTotal">0</div></div>
      <div class="sg-box"><div class="sg-lbl">WIN</div><div class="sg-val sv-green" id="scWin">0</div></div>
      <div class="sg-box"><div class="sg-lbl">SL</div><div class="sg-val sv-red" id="scSL">0</div></div>
      <div class="sg-box"><div class="sg-lbl">PEND</div><div class="sg-val sv-orange" id="scPend">0</div></div>
    </div>
    <div class="ratio-row">
      <div style="font-size:9px;color:var(--dim)">WIN RATIO</div>
      <div class="ratio-bar"><div class="ratio-fill" id="scRatioFill"></div></div>
      <div class="ratio-pct" id="scRatioPct">0%</div>
    </div>
    <div class="breakdown-row">
      <div class="bk-box buy-box"><div class="bk-lbl">▲ BUY</div><div class="bk-count" id="scBuy">0</div></div>
      <div class="bk-box sell-box"><div class="bk-lbl">▼ SELL</div><div class="bk-count" id="scSell">0</div></div>
    </div>
    <div style="font-size:8px;color:var(--dim);letter-spacing:2px;margin-bottom:6px">⚙️ CRITERIA</div>
    <div class="crit-list" id="scCritList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const SD=[
  {name:'MORNING BELL',icon:'🔔',criteria:['Price >500','Score 0-100','CMF > 0','OBV Rising','15m Breakout','Sector OK'],total:14,buy:10,sell:4,win:11,sl:2,pending:1},
  {name:'MAHAKAL',icon:'⚡',criteria:['Candlestick','Chart Pattern','Trendline','S/R Zone','Fibonacci','Round No','Risk Reward','Mkt Structure'],total:12,buy:9,sell:3,win:10,sl:1,pending:1},
  {name:'BHERVE',icon:'🌊',criteria:['Vol Profile','Smart Money','HMA Wave','Bollinger','Elder Impulse','Fixed Range','SuperTrend'],total:10,buy:7,sell:3,win:8,sl:2,pending:0},
  {name:'INDEX POWER',icon:'📡',criteria:['Intl Indices','PCR+Volume','S/R Zones','Sector Wise','Commodity','VIX','FII/DII','DXY'],total:8,buy:6,sell:2,win:7,sl:1,pending:0},
  {name:'TRISHUL',icon:'🔱',criteria:['US Fed Data','Global News','RBI Policy','Indian Events','Stock News','Manual Override'],total:6,buy:5,sell:1,win:5,sl:1,pending:0},
  {name:'SUDARSHAN',icon:'☸️',criteria:['Vol+OI+PCR','Prev Day H/L','Day S/R','Horizontal S/R','Trendline','Range BRK','Candlestick','Chart Pattern'],total:16,buy:11,sell:5,win:13,sl:2,pending:1},
  {name:'BRAHMASTRA',icon:'💥',criteria:['Volume 25%','VWAP 20%','Pivot 18%','RSI 15%','EMA 12%','ADX 10%'],total:18,buy:13,sell:5,win:15,sl:2,pending:1},
  {name:'EXPIRY SCALPER',icon:'⏱️',criteria:['PCR Ratio','MMI Index','Open Int','7EMA Sync','VWAP Sync','Time Lock'],total:9,buy:7,sell:2,win:8,sl:1,pending:0},
  {name:'ALL-IN-ONE',icon:'🚐',criteria:['5/8 Scanner','Score Meter','Power Table','Entry Signal','Target Auto','Must Buy'],total:7,buy:7,sell:0,win:6,sl:1,pending:0},
];

document.getElementById('scannerGrid').innerHTML = SD.map((sc,i)=>`
  <div class="sc-box" onclick="openScannerModal(${i})">
    <div class="scn-icon">${sc.icon}</div>
    <div class="scn-tag">🔱 SCANNER</div>
    <div class="scn-name">${sc.name}</div>
    <div class="scn-live"><div class="live-dot"></div><span>LIVE</span></div>
  </div>`).join('');

function openScannerModal(i) {
  const sc=SD[i];
  document.getElementById('scModalIcon').textContent=sc.icon;
  document.getElementById('scModalName').textContent=sc.name;
  document.getElementById('scTotal').textContent=sc.total;
  document.getElementById('scWin').textContent=sc.win;
  document.getElementById('scSL').textContent=sc.sl;
  document.getElementById('scPend').textContent=sc.pending;
  const ratio=Math.round((sc.win/sc.total)*100);
  document.getElementById('scRatioFill').style.width=ratio+'%';
  document.getElementById('scRatioPct').textContent=ratio+'%';
  document.getElementById('scBuy').textContent=sc.buy;
  document.getElementById('scSell').textContent=sc.sell;
  document.getElementById('scCritList').innerHTML=sc.criteria.map(c=>`<div class="crit-row-in pass"><span class="crit-name-in">✅ ${c}</span><span class="crit-val-in">OK</span></div>`).join('');
  document.getElementById('scannerModal').classList.add('show');
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function doLogout(){if(confirm('Logout करना है?')){window.location.href='page1_login.html';}}

document.getElementById('navContainer').innerHTML=`<div class="bottom-nav"><a class="nav-item" href="page2_home.html"><div class="nav-icon">🏠</div><div class="nav-label">HOME</div></a><a class="nav-item active" href="page3_signal.html"><div class="nav-icon">📡</div><div class="nav-label">SIGNAL</div></a><a class="nav-item" href="page4_power.html"><div class="nav-icon">⚡</div><div class="nav-label">POWER</div></a><a class="nav-item" href="page5_chart.html"><div class="nav-icon">📊</div><div class="nav-label">CHART</div></a><a class="nav-item" href="page6_watchlist.html"><div class="nav-icon">⭐</div><div class="nav-label">WATCH</div></a><a class="nav-item" href="page7_admin.html"><div class="nav-icon">⚙️</div><div class="nav-label">ADMIN</div></a></div>`;
</script>
</body>
</html>
