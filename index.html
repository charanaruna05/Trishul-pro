<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>🔱 TRINETR · PRO MASTER</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
<style>
/* ═══════════════════════════════════════════
   GLOBAL RESET
═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#ffd700; --bg:#030712; --card:#0f1425;
  --green:#2ecc71; --red:#e74c3c; --border:#2a345a;
  --accent:#ff9800; --nav-h:68px;
}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);height:100dvh;width:100%;
  display:flex;flex-direction:column;color:white;
  font-family:'Segoe UI',sans-serif;
  max-width:480px;margin:0 auto;
}

/* ═══════════════════════════════════════════
   PAGE SYSTEM
═══════════════════════════════════════════ */
.page{display:none;flex-direction:column;flex:1;overflow:hidden;position:relative;}
.page.active{display:flex;}

/* ═══════════════════════════════════════════
   BOTTOM NAV (shared across all pages)
═══════════════════════════════════════════ */
#bnav{
  height:var(--nav-h);background:#0a0f1c;
  display:flex;border-top:2.5px solid var(--gold);
  position:relative;flex-shrink:0;z-index:100;
}
#bnav.hidden{display:none;}
.nb{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:transparent;border:none;cursor:pointer;
  color:#555;text-decoration:none;transition:color .15s;
  padding:0;
}
.nb.on{color:var(--gold);}
.nb .ni{font-size:24px;margin-bottom:2px;line-height:1;}
.nb .nt{font-size:9px;font-weight:900;letter-spacing:.5px;}

/* ═══════════════════════════════════════════
   LOGIN PAGE
═══════════════════════════════════════════ */
#pg-login{background:#030712;align-items:center;justify-content:center;}
.login-wrap{
  width:88%;max-width:340px;
  background:#0f1425;border:2px solid var(--gold);
  padding:36px 24px 28px;
}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .t1{color:var(--gold);font-size:26px;font-weight:900;letter-spacing:4px;}
.login-logo .t2{color:#8a9fd8;font-size:8px;letter-spacing:3px;margin-top:3px;}
.login-logo .sep{width:50px;height:2px;background:var(--gold);margin:10px auto 0;}
.finput{
  width:100%;background:#030712;border:1px solid var(--border);
  padding:11px 12px;color:white;font-family:'Segoe UI',sans-serif;
  font-size:13px;margin-bottom:10px;outline:none;transition:border-color .2s;
}
.finput:focus{border-color:var(--gold);}
.finput::placeholder{color:#555;}
.login-btn{
  width:100%;background:var(--gold);color:#000;
  border:none;padding:13px;font-weight:900;
  font-size:14px;letter-spacing:2px;cursor:pointer;margin-top:4px;
}
.login-btn:active{opacity:.8;}
.login-err{color:var(--red);font-size:9px;text-align:center;margin-top:8px;min-height:14px;}
.login-hint{color:#555;font-size:8px;text-align:center;margin-top:10px;}

/* ═══════════════════════════════════════════
   HOME PAGE — ORIGINAL DESIGN PRESERVED
═══════════════════════════════════════════ */
/* 1. News ticker */
.news-ticker{
  height:32px;background:#0a0e1a;
  border-bottom:1.5px solid var(--gold);
  display:flex;align-items:center;flex-shrink:0;
}
marquee{font-size:11px;color:var(--gold);font-weight:bold;}

/* 2. Logo */
.home-header{
  height:45px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
}
.logo{
  border:1.5px solid var(--gold);padding:4px 30px;
  font-size:16px;font-weight:900;color:var(--gold);letter-spacing:4px;
}

/* 3. Top stats */
.top-stats{
  height:70px;display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;padding:0 10px;flex-shrink:0;
}
.stat-box{
  background:#0c1122;border:1.2px solid var(--border);
  display:flex;flex-direction:column;
  justify-content:center;text-align:center;border-radius:4px;
}
.stat-label{font-size:8px;color:#8a9fd8;font-weight:bold;}
.stat-val{font-size:11px;font-weight:bold;color:white;}
.profile-link{border:1.2px solid var(--gold);color:var(--gold);cursor:pointer;}

/* 4. Entry desk */
.entry-section{height:90px;padding:0 10px;margin-top:5px;flex-shrink:0;}
.entry-card{
  background:#0a0f1c;border:1.5px solid var(--border);
  height:100%;padding:5px;
  display:flex;flex-direction:column;justify-content:space-around;border-radius:4px;
}
.entry-row{display:flex;gap:4px;align-items:center;}
.symbol{
  background:#1e2a4a;border:1px solid var(--gold);color:var(--gold);
  font-size:9px;padding:4px 2px;min-width:65px;
  text-align:center;font-weight:bold;
}
.p-chip{background:#0f1428;border:1px solid #ffd70015;display:flex;flex-direction:column;align-items:center;flex:1;padding:2px 0;}
.p-label{font-size:6px;color:#8a9fd8;font-weight:800;}
.p-val{font-size:9px;font-weight:bold;color:var(--gold);}

/* 5. Sector grid */
.sector-section{flex:1;padding:5px 10px 4px 10px;display:flex;align-items:flex-start;overflow:hidden;}
.sector-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(6,1fr);
  gap:4px;height:100%;width:100%;
}
.sbox{
  border:1px solid var(--border);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  cursor:pointer;border-radius:3px;padding:2px 0;
}
.sbox.bullish{background:#064e3b35;border-color:var(--green);}
.sbox.bearish{background:#7f1d1d35;border-color:var(--red);}
.sbox.neutral{background:#0c1122;border-color:var(--border);}
.box-name{font-size:9px;font-weight:900;color:#fff;text-transform:uppercase;}
.box-data{font-size:8px;font-weight:bold;margin-top:1px;}

/* Sector popup sheet */
.sheet{
  position:fixed;bottom:-100%;left:0;width:100%;height:55%;
  background:#0f172a;border-top:4px solid var(--gold);
  transition:.3s cubic-bezier(0,0,.2,1);z-index:500;
  padding:20px;border-radius:20px 20px 0 0;
  max-width:480px;
}
.sheet.open{bottom:0;}
.done-btn{
  background:var(--gold);color:black;padding:4px 15px;
  border-radius:4px;font-weight:bold;cursor:pointer;border:none;
}

/* ═══════════════════════════════════════════
   SIGNAL PAGE (TRISHUL DASHBOARD)
═══════════════════════════════════════════ */
#pg-signal{background:#000;}
#pg-signal .sig-hdr{
  padding:10px;text-align:center;
  border-bottom:2px solid var(--gold);background:#000;flex-shrink:0;
}
#pg-signal .sig-hdr h1{font-size:15px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-weight:900;}
.signal-grid{
  flex:1;display:grid;grid-template-rows:repeat(3,1fr);
  gap:6px;padding:7px;overflow:hidden;
}
.row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.sigbox{
  background:#0c0c0c;border:1.5px solid var(--gold);
  display:flex;flex-direction:column;justify-content:center;
  align-items:center;text-align:center;cursor:pointer;padding:6px 4px;
  transition:all .15s;
}
.sigbox:active{background:#1a1200;transform:scale(.97);}
.sigbox i{font-size:22px;color:var(--gold);margin-bottom:5px;}
.b-lbl{font-size:7px;color:var(--gold);font-weight:900;margin-bottom:3px;letter-spacing:.8px;opacity:.85;}
.b-val{font-size:10.5px;font-weight:900;color:white;}
.split-box{padding:0!important;}
.split-half{width:100%;height:50%;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;}
.split-half:active{background:#1a1200;}
.split-sep{width:85%;height:1px;background:var(--gold);opacity:.3;}

/* Signal detail */
#pg-sig-detail{background:#000;}
.info-header{background:#111;margin:8px;padding:12px;border:1px solid var(--accent);text-align:center;flex-shrink:0;}
.info-header h2{font-size:13px;text-transform:uppercase;color:var(--accent);}
.stats-row{display:flex;justify-content:space-around;padding-top:8px;border-top:1px solid #222;margin-top:6px;}
.v-item{display:grid;grid-template-columns:1.2fr 1px 1fr 1px 1.2fr;background:#0c0c0c;border:1px solid #1f1f1f;margin-bottom:7px;height:60px;align-items:center;}
.v-cut{width:1px;height:38px;background:#1f1f1f;}
.cell{text-align:center;padding:4px;}
.st-name{font-size:11px;font-weight:900;}
.st-price{font-size:12px;font-weight:900;}
.st-tag{font-size:8px;padding:3px 7px;color:#fff;font-weight:900;}
.bg-up{background:#00c853!important;}.bg-down{background:#ff3d00!important;}
.up{color:#00c853!important;}.down{color:#ff3d00!important;}
.btn-back{background:var(--accent);color:#000;border:none;padding:14px;font-weight:900;font-size:12px;letter-spacing:1px;cursor:pointer;width:100%;flex-shrink:0;}

/* ═══════════════════════════════════════════
   WATCHLIST PAGE — ORIGINAL DESIGN
═══════════════════════════════════════════ */
#pg-watch{background:#000;}
.top-patti{
  background:#111;color:var(--gold);
  text-align:center;padding:12px 0;
  font-size:16px;font-weight:900;
  border-bottom:1.5px solid var(--gold);flex-shrink:0;
}
.wl-table-wrap{flex:1;overflow-y:auto;overflow-x:hidden;}
.wl-table-wrap::-webkit-scrollbar{width:2px;}
.wl-table-wrap::-webkit-scrollbar-thumb{background:#222;}
table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed;}
th{background:#1a1a1a;color:var(--gold);padding:9px 2px;border:1px solid var(--gold);position:sticky;top:0;z-index:5;font-size:9px;}
td{padding:9px 2px;border:1px solid #222;text-align:center;}
.col-sr{width:28px;}.col-stock{width:80px;}.col-price{width:65px;}
.col-sec{width:45px;}.col-scan{width:42px;}.col-sig{width:50px;}.col-scr{width:38px;}
#wl-popup{
  position:fixed;top:-100%;left:0;width:100%;height:45%;
  background:#0d0d0d;border-bottom:3px solid var(--gold);
  transition:.4s ease;z-index:2000;padding:14px;max-width:480px;
}
#wl-popup.open{top:0;}
.popup-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.data-card{background:#1a1a1a;padding:8px;border:1px solid var(--gold);text-align:center;font-size:10px;}
.data-card .val{display:block;font-weight:900;font-size:13px;margin-top:3px;}
.close-btn{float:right;color:var(--red);font-weight:900;cursor:pointer;padding:4px;font-size:14px;}

/* ═══════════════════════════════════════════
   CHART PAGE
═══════════════════════════════════════════ */
#pg-chart{background:#030712;}
#chart-hdr{background:#0f1425;border-bottom:1px solid var(--border);padding:3px 10px 2px;flex-shrink:0;}
.cht{display:flex;justify-content:space-between;align-items:center;}
#c-sym{color:var(--gold);font-size:13px;font-weight:900;letter-spacing:2px;}
#c-ltp{font-size:15px;font-weight:900;color:var(--green);}
#c-chg{font-size:8px;text-align:right;}
.clegs{display:flex;gap:8px;margin-top:1px;font-size:7px;}
.cleg{display:flex;align-items:center;gap:3px;}
.cll{width:12px;height:2px;flex-shrink:0;}
#tf-row{display:flex;gap:3px;padding:3px 8px;background:#030712;border-bottom:1px solid var(--border);flex-shrink:0;}
.tf{background:#0f1425;color:#555;border:1px solid var(--border);padding:2px 7px;font-size:8.5px;font-weight:700;cursor:pointer;transition:all .15s;border-radius:3px;}
.tf.on{background:var(--gold);color:#000;border-color:var(--gold);}
#main-wrap{flex:1;background:#030712;position:relative;overflow:hidden;}
#main-svg{width:100%;height:100%;display:block;}
#zoom-bar{display:flex;align-items:center;gap:6px;background:#0f1425;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:2px 10px;flex-shrink:0;}
#zlbl{color:#555;font-size:8px;flex:1;}
.zb{width:22px;height:22px;border:1px solid var(--border);background:#0f1425;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none;border-radius:3px;}
#zb-p{color:var(--green);border-color:#1e4a30;} #zb-p:active{background:#0d2e1c;transform:scale(.88);}
#zb-m{color:var(--red);border-color:#4a1e1e;} #zb-m:active{background:#2e0d0d;transform:scale(.88);}
#ind-sec{background:#0f1425;border-top:1px solid var(--border);padding:3px 4px 4px;flex-shrink:0;}
#ind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;}
.ibox{border:1px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 2px;height:36px;gap:1px;transition:all .4s;}
.ibox.buy{background:#0d2b18;border-color:#1e5c30;}
.ibox.sell{background:#2b0d0d;border-color:#5c1e1e;}
.ibox.ntrl{background:#0c1122;border-color:var(--border);}
.iname{font-size:7px;font-weight:900;letter-spacing:.5px;opacity:.85;}
.ibox.buy .iname{color:#6effa0;}.ibox.sell .iname{color:#ff8877;}.ibox.ntrl .iname{color:#8a9fd8;}
.ival{font-size:9.5px;font-weight:900;color:#fff;}
.isig{font-size:7px;font-weight:900;letter-spacing:.5px;}
.ibox.buy .isig{color:var(--green);}.ibox.sell .isig{color:var(--red);}.ibox.ntrl .isig{color:#8a9fd8;}
@keyframes flash{0%{opacity:1}35%{opacity:.1}100%{opacity:1}}
.flash{animation:flash .4s ease;}

/* ═══════════════════════════════════════════
   CONTROL / ADMIN PAGE — ORIGINAL DESIGN
═══════════════════════════════════════════ */
#pg-control{background:#000;}
#pg-control .ctrl-body{flex:1;overflow-y:auto;padding:12px 12px 6px;}
#pg-control .ctrl-body::-webkit-scrollbar{width:2px;}
.prof-card{
  background:#111;border:1px solid var(--gold);
  padding:15px;display:flex;justify-content:space-between;
  align-items:center;margin-bottom:12px;
}
.info-group{display:flex;flex-direction:column;gap:2px;}
.id-label{font-weight:900;color:var(--gold);font-size:1rem;}
.phone-email{font-size:.75rem;opacity:.8;}
.mode-btn{background:var(--gold);color:black;border:none;padding:8px 12px;cursor:pointer;font-weight:800;font-size:.7rem;}
.summary-card{background:#111;border:1px solid var(--gold);padding:15px;margin-bottom:12px;}
.ptabs{display:flex;gap:5px;margin-bottom:12px;}
.ptab{flex:1;padding:10px;font-size:.7rem;background:#222;border:none;color:var(--gold);cursor:pointer;font-weight:800;}
.ptab.on{background:var(--gold);color:black;}
.pnl-row{display:flex;justify-content:space-between;align-items:center;margin-top:5px;}
.pnl-value{color:#00ff41;font-weight:900;font-size:1.2rem;}
.bot-stats{font-size:.8rem;opacity:.8;margin-top:8px;}
.ctrl-grid{border:1px solid var(--gold);margin-bottom:12px;}
.edit-item{background:#111;padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333;}
.edit-item:last-child{border-bottom:none;}
.item-name{font-size:.85rem;font-weight:700;}
.change-btn{background:#0056b3;color:white;border:none;cursor:pointer;font-size:.75rem;font-weight:800;width:100px;height:35px;}
.exit-btn{width:100%;height:50px;background:#8b0000;color:white;border:none;margin-top:15px;font-weight:900;font-size:1rem;cursor:pointer;}
.exit-btn:active{background:#5c0000;}

/* ── OTP / Change Password Modal ── */
#otp-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;align-items:center;justify-content:center;
  z-index:9999;
}
#otp-modal.show{display:flex;}
.otp-box{
  width:88%;max-width:340px;
  background:#0f1425;border:2px solid var(--gold);
  padding:28px 22px 22px;
}
.otp-title{color:var(--gold);font-size:14px;font-weight:900;letter-spacing:2px;text-align:center;margin-bottom:18px;}
.otp-step{display:none;}
.otp-step.show{display:block;}
.otp-input{
  width:100%;background:#000;border:1px solid var(--gold);
  padding:10px 12px;color:white;font-size:14px;font-family:'Courier New',monospace;
  margin-bottom:10px;outline:none;letter-spacing:3px;text-align:center;
}
.otp-input:focus{border-color:#fff;}
.otp-btn{
  width:100%;background:var(--gold);color:#000;border:none;
  padding:11px;font-weight:900;font-size:13px;letter-spacing:1px;cursor:pointer;
}
.otp-btn:active{opacity:.8;}
.otp-cancel{
  width:100%;background:transparent;color:#555;border:1px solid #333;
  padding:9px;font-size:12px;cursor:pointer;margin-top:6px;
}
.otp-msg{font-size:10px;text-align:center;min-height:16px;margin-top:6px;}
.otp-display{
  background:#000;border:1px solid var(--gold);
  padding:14px;text-align:center;margin-bottom:14px;
}
.otp-display .otp-code{
  font-size:28px;font-weight:900;color:var(--gold);
  letter-spacing:8px;font-family:'Courier New',monospace;
}
.otp-display small{color:#555;font-size:9px;display:block;margin-top:4px;}
.chpwd-btn{
  width:100%;background:#003366;color:white;border:1px solid #0056b3;
  padding:11px;font-weight:900;font-size:12px;
  letter-spacing:1px;cursor:pointer;margin-top:8px;margin-bottom:4px;
}
.chpwd-btn:active{background:#002244;}

/* ── SHOONYA BROKER MODAL ── */
#shoonya-modal{
  position:fixed;inset:0;background:rgba(0,0,0,.9);
  display:none;align-items:center;justify-content:center;
  z-index:9999;
}
#shoonya-modal.show{display:flex;}
.shoonya-box{
  width:92%;max-width:360px;
  background:#0f1425;border:2px solid var(--gold);
  padding:24px 20px 20px;max-height:90vh;overflow-y:auto;
}
.shoonya-title{color:var(--gold);font-size:15px;font-weight:900;letter-spacing:2px;text-align:center;margin-bottom:6px;}
.shoonya-sub{color:#8a9fd8;font-size:9px;text-align:center;margin-bottom:16px;}
.shoonya-status{
  padding:8px;text-align:center;font-size:11px;font-weight:700;
  margin-bottom:10px;min-height:18px;
}
.s-connected{color:#2ecc71;background:#0d2b18;border:1px solid #2ecc71;}
.s-error{color:#e74c3c;background:#2b0d0d;border:1px solid #e74c3c;}
.shoonya-btn{
  width:100%;background:var(--gold);color:#000;border:none;
  padding:12px;font-weight:900;font-size:13px;letter-spacing:1px;cursor:pointer;margin-top:6px;
}
.shoonya-btn:active{opacity:.8;}
.shoonya-cancel{
  width:100%;background:transparent;color:#555;border:1px solid #333;
  padding:9px;font-size:12px;cursor:pointer;margin-top:6px;
}
.broker-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:#0d2b18;border:1px solid #2ecc71;
  padding:4px 10px;font-size:10px;color:#2ecc71;font-weight:700;
}
</style>
</head>
<body>

<!-- ═══════════════════════════════
     LOGIN PAGE
═══════════════════════════════ -->
<div class="page active" id="pg-login">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="t1">🔱 TRINETR</div>
      <div class="t2">PRO MASTER SYSTEM</div>
      <div class="sep"></div>

    <input class="finput" id="l-user" type="text" placeholder="Username" autocomplete="off"/>
    <input class="finput" id="l-pass" type="password" placeholder="Password"/>
    <button class="login-btn" onclick="doLogin()">LOGIN →</button>
    <div class="login-err" id="l-err"></div>
    <div class="login-hint">User: Charan007</div>
  </div>
</div>

<!-- ═══════════════════════════════
     HOME PAGE — ORIGINAL DESIGN
═══════════════════════════════ -->
<div class="page" id="pg-home">
  <!-- 1. News ticker -->
  <div class="news-ticker">
    <marquee scrollamount="4">🔱 TRINETR: NIFTY 23850 ▲ | RELIANCE BULLISH | SECTOR ROTATION ACTIVE | COMMODITY GOLD 72450 🔱</marquee>
  </div>
  <!-- 2. Logo -->
  <div class="home-header">
    <div class="logo">🔱 TRINETR 🔱</div>
  </div>
  <!-- 3. Top stats -->
  <div class="top-stats">
    <div class="stat-box"><span class="stat-label">NIFTY 50</span><span class="stat-val" id="h-nifty">—</span></div>
    <div class="stat-box"><span class="stat-label">SENSEX</span><span class="stat-val" id="h-sensex">—</span></div>
    <div class="stat-box"><span class="stat-label">GOLD</span><span class="stat-val" id="h-gold">—</span></div>
    <div class="stat-box profile-link" onclick="goPage('control')">
      <span class="stat-label" style="color:var(--gold)">PROFILE</span>
      <span class="stat-val">👤</span>
    </div>
  </div>
  <!-- 4. Entry desk -->
  <div class="entry-section">
    <div class="entry-card">
