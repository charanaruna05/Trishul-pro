<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔱 Trishul Pro — Watchlist</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Rajdhani',sans-serif;}
:root{--gold:#f5c518;--gold2:#c9a000;--bg:#000;--bg2:#0a0a0a;--bg3:#121212;--bg4:#1a1a1a;--border:#222;--bordergold:#3d3000;--text:#eee;--dim:#888;--green:#00c853;--red:#ff3d3d;--orange:#ff6d00;--blue:#1976d2;}
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden;}
.phone-frame{width:100%;max-width:430px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);border:2px solid var(--gold);overflow:hidden;position:relative;}
.ad-header{flex-shrink:0;background:var(--bg2);border-bottom:2px solid var(--gold);padding:10px 14px;text-align:center;}
.ad-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--gold);letter-spacing:2.5px;}
/* CONTROLS */
.wl-controls{flex-shrink:0;display:flex;gap:6px;padding:6px 8px;background:var(--bg2);border-bottom:1px solid var(--border);}
.search-input{flex:1;background:var(--bg3);border:1px solid var(--bordergold);padding:7px 10px;color:var(--text);font-size:12px;outline:none;min-width:0;}
.search-input:focus{border-color:var(--gold);}
.sort-btn{background:var(--bg3);border:1px solid var(--bordergold);color:var(--gold);padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:1px;}
/* TABLE HEADER */
.table-head{flex-shrink:0;display:grid;grid-template-columns:28px 1fr 80px 45px 42px 35px;gap:0;background:#0a0900;border-bottom:2px solid var(--gold);padding:5px 6px;}
.th-cell{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;text-align:center;}
.th-cell:nth-child(2){text-align:left;}
/* TABLE BODY */
.table-body{flex:1;overflow-y:auto;scrollbar-width:none;}
.table-body::-webkit-scrollbar{display:none;}
.tr-row{display:grid;grid-template-columns:28px 1fr 80px 45px 42px 35px;gap:0;padding:7px 6px;border-bottom:1px solid #111;align-items:center;}
.tr-row:active{background:#0d0d00;}
.td-cell{font-size:11px;font-weight:700;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-num{color:#444;font-size:9px;}
.td-stock{text-align:left;color:var(--text);cursor:pointer;font-size:12px;}
.td-stock:active{color:var(--gold);}
.td-price{color:var(--gold);font-size:11px;cursor:pointer;font-family:'Orbitron',sans-serif;}
.td-scan{color:var(--dim);font-size:9px;cursor:pointer;}
.td-sig{font-size:10px;font-weight:800;letter-spacing:1px;}
.td-sig.buy{color:var(--green);}
.td-sig.sell{color:var(--red);}
.td-score{color:var(--orange);font-size:11px;font-weight:800;}
/* BOTTOM NAV */
.bottom-nav{flex-shrink:0;display:flex;background:var(--bg2);border-top:2px solid var(--gold);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 4px 5px;cursor:pointer;gap:2px;transition:all 0.2s;text-decoration:none;}
.nav-item:active{background:#1a1600;}
.nav-icon{font-size:17px;line-height:1;}
.nav-label{font-size:8px;color:var(--dim);letter-spacing:0.5px;font-weight:700;}
.nav-item.active .nav-label{color:var(--gold);}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 4px var(--gold));}
/* EXIT FAB */
.exit-fab{position:absolute;top:10px;right:10px;width:32px;height:32px;background:linear-gradient(135deg,#8b0000,var(--red));border:2px solid #ff8888;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;z-index:200;box-shadow:0 0 10px rgba(255,61,61,0.4);}
/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-bg.show{display:flex;}
.modal-box{background:var(--bg2);border:2px solid var(--gold);width:calc(100% - 32px);max-width:380px;padding:14px;max-height:90vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid var(--bordergold);margin-bottom:12px;}
.modal-title{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--gold);letter-spacing:2px;}
.modal-close{background:none;border:1px solid var(--border);color:var(--dim);font-size:18px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
/* TRADE MODAL */
.trade-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.tr-gbox{border:1px solid var(--border);padding:10px 8px;text-align:center;}
.tr-gbox.entry{border-color:var(--gold);background:#0d0b00;}
.tr-gbox.exit{border-color:var(--green);background:#002a14;}
.tr-gbox.sl{border-color:var(--red);background:#2a0000;}
.tr-gbox.tsl{border-color:var(--orange);background:#1a0700;}
.tr-gbox.t1{border-color:#005020;background:#001a0a;}
.tr-gbox.t2{border-color:#006030;background:#001a0a;}
.tr-gbox.t3{border-color:#007040;background:#001a0a;}
.tr-lbl-in{font-size:8px;font-weight:700;color:var(--dim);letter-spacing:1.5px;margin-bottom:4px;}
.tr-val-in{font-size:18px;font-weight:800;font-family:'Orbitron',sans-serif;color:var(--text);}
.tr-gbox.entry .tr-val-in{color:var(--gold);}
.tr-gbox.exit .tr-val-in,.tr-gbox.t1 .tr-val-in,.tr-gbox.t2 .tr-val-in,.tr-gbox.t3 .tr-val-in{color:var(--green);}
.tr-gbox.sl .tr-val-in,.tr-gbox.tsl .tr-val-in{color:var(--red);}
/* OHLC */
.ohlc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ohlc-box{background:var(--bg3);border:1px solid var(--border);padding:14px;text-align:center;}
.ohlc-lbl{font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:6px;}
.ohlc-val{font-size:22px;font-weight:800;font-family:'Orbitron',sans-serif;color:var(--text);}
/* CRIT LIST */
.crit-list{display:flex;flex-direction:column;gap:6px;}
.crit-row-in{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);}
.crit-row-in.pass{border-color:var(--green);background:#002a14;}
.crit-name-in{font-size:11px;font-weight:700;}
.crit-val-in{font-size:11px;font-weight:800;color:var(--green);}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bordergold);padding:8px 16px;font-size:11px;color:var(--text);z-index:9999;white-space:nowrap;display:none;}
.toast.show{display:block;}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="exit-fab" onclick="doLogout()" title="Logout">⏻</div>
  <div class="ad-header"><div class="ad-title">📋 TRISHUL WATCHLIST</div></div>
  <div class="wl-controls">
    <input class="search-input" id="searchInput" placeholder="🔍 Search stock..." oninput="renderWatchlist()"/>
    <button class="sort-btn" onclick="toggleSort()">⇅ SCORE</button>
  </div>
  <div class="table-head">
    <div class="th-cell">सं.</div>
    <div class="th-cell">स्टॉक</div>
    <div class="th-cell">PRICE</div>
    <div class="th-cell">SCAN</div>
    <div class="th-cell">SIG</div>
    <div class="th-cell">SCR</div>
  </div>
  <div class="table-body" id="tableBody"></div>
  <div id="navContainer"></div>
</div>

<!-- TRADE MODAL -->
<div class="modal-bg" id="tradePopup" onclick="closeModal('tradePopup')">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title">💼 TRADE — <span id="tradeStock">RELIANCE</span></div>
      <button class="modal-close" onclick="closeModal('tradePopup')">✕</button>
    </div>
    <div class="trade-grid">
      <div class="tr-gbox entry"><div class="tr-lbl-in">ENTRY</div><div class="tr-val-in" id="trEntry">₹2450</div></div>
      <div class="tr-gbox exit"><div class="tr-lbl-in">EXIT</div><div class="tr-val-in" id="trExit">₹2500</div></div>
      <div class="tr-gbox sl"><div class="tr-lbl-in">STOP LOSS</div><div class="tr-val-in" id="trSL">₹2415</div></div>
      <div class="tr-gbox tsl"><div class="tr-lbl-in">TRAILING SL</div><div class="tr-val-in" id="trTSL">₹2432</div></div>
      <div class="tr-gbox t1"><div class="tr-lbl-in">TARGET 1</div><div class="tr-val-in" id="trT1">₹2478</div></div>
      <div class="tr-gbox t2"><div class="tr-lbl-in">TARGET 2</div><div class="tr-val-in" id="trT2">₹2505</div></div>
      <div class="tr-gbox t3" style="grid-column:span 2"><div class="tr-lbl-in">TARGET 3</div><div class="tr-val-in" id="trT3">₹2540</div></div>
    </div>
  </div>
</div>

<!-- OHLC MODAL -->
<div class="modal-bg" id="ohlcPopup" onclick="closeModal('ohlcPopup')">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title">📊 OHLC — <span id="ohlcStock">RELIANCE</span></div>
      <button class="modal-close" onclick="closeModal('ohlcPopup')">✕</button>
    </div>
    <div class="ohlc-grid">
      <div class="ohlc-box"><div class="ohlc-lbl">OPEN</div><div class="ohlc-val" id="ohlcO">₹2420</div></div>
      <div class="ohlc-box"><div class="ohlc-lbl">HIGH</div><div class="ohlc-val" style="color:var(--green)" id="ohlcH">₹2475</div></div>
      <div class="ohlc-box"><div class="ohlc-lbl">LOW</div><div class="ohlc-val" style="color:var(--red)" id="ohlcL">₹2405</div></div>
      <div class="ohlc-box"><div class="ohlc-lbl">CLOSE</div><div class="ohlc-val" id="ohlcC">₹2460</div></div>
    </div>
  </div>
</div>

<!-- SCAN CRITERIA MODAL -->
<div class="modal-bg" id="scanPopup" onclick="closeModal('scanPopup')">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title" id="scanTitle">⚡ BRAHMASTRA</div>
      <button class="modal-close" onclick="closeModal('scanPopup')">✕</button>
    </div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:10px;text-align:center" id="scanStock">RELIANCE — Why Selected</div>
    <div class="crit-list" id="critList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const SCANNER_MAP={'TS':{name:'🔱 TRISHUL'},'SS':{name:'☸️ SUDARSHAN'},'AiO':{name:'🚐 ALL-IN-ONE'},'IND':{name:'📡 INDEX POWER'},'SCP':{name:'⏱️ EXPIRY SCALPER'},'BMS':{name:'💥 BRAHMASTRA'},'MH':{name:'⚡ MAHAKAL'},'MB':{name:'🔔 MORNING BELL'},'BH':{name:'🌊 BHERVE'}};
let WL=[
  {name:'TCS',price:2015.50,scan:'TS',sig:'SELL',score:94},{name:'HDFC BANK',price:2031,scan:'SS',sig:'BUY',score:93},
  {name:'INFY',price:2046.50,scan:'AiO',sig:'SELL',score:92},{name:'SBI',price:2062,scan:'IND',sig:'BUY',score:91},
  {name:'ITC',price:2077.50,scan:'SCP',sig:'SELL',score:90},{name:'WIPRO',price:2093,scan:'BMS',sig:'BUY',score:89},
  {name:'RELIANCE',price:2108.50,scan:'TS',sig:'SELL',score:88},{name:'KOTAK',price:2124,scan:'SS',sig:'BUY',score:87},
  {name:'AXIS',price:2139.50,scan:'AiO',sig:'SELL',score:86},{name:'BAJAJ FIN',price:2155,scan:'IND',sig:'BUY',score:85},
  {name:'MARUTI',price:2170.50,scan:'SCP',sig:'SELL',score:84},{name:'M&M',price:2186,scan:'BMS',sig:'BUY',score:83},
  {name:'TATA STEEL',price:2201.50,scan:'MH',sig:'SELL',score:82},{name:'HINDUNILVR',price:2217,scan:'SS',sig:'BUY',score:81},
  {name:'ASIAN PAINT',price:2232.50,scan:'AiO',sig:'SELL',score:80},{name:'POWERGRID',price:2248,scan:'IND',sig:'BUY',score:79},
];
let sortAsc=false;

function renderWatchlist(){
  WL.sort((a,b)=>sortAsc?a.score-b.score:b.score-a.score);
  const filter=document.getElementById('searchInput').value.toLowerCase();
  const filtered=WL.filter(s=>s.name.toLowerCase().includes(filter));
  document.getElementById('tableBody').innerHTML=filtered.map((s,i)=>`
    <div class="tr-row">
      <div class="td-cell td-num">${i+1}</div>
      <div class="td-cell td-stock" onclick="openTrade('${s.name}',${s.price})">${s.name}</div>
      <div class="td-cell td-price" onclick="openOHLC('${s.name}',${s.price})">₹${s.price.toFixed(0)}</div>
      <div class="td-cell td-scan" onclick="openScanCrit('${s.scan}','${s.name}')">${s.scan}</div>
      <div class="td-cell td-sig ${s.sig==='BUY'?'buy':'sell'}">${s.sig}</div>
      <div class="td-cell td-score">${s.score}</div>
    </div>`).join('');
}

function toggleSort(){sortAsc=!sortAsc;renderWatchlist();}

function openTrade(name,price){
  document.getElementById('tradeStock').textContent=name;
  document.getElementById('trEntry').textContent='₹'+price.toFixed(2);
  document.getElementById('trSL').textContent='₹'+(price*0.985).toFixed(2);
  document.getElementById('trTSL').textContent='₹'+(price*0.992).toFixed(2);
  document.getElementById('trExit').textContent='₹'+(price*1.025).toFixed(2);
  document.getElementById('trT1').textContent='₹'+(price*1.012).toFixed(2);
  document.getElementById('trT2').textContent='₹'+(price*1.022).toFixed(2);
  document.getElementById('trT3').textContent='₹'+(price*1.035).toFixed(2);
  document.getElementById('tradePopup').classList.add('show');
}
function openOHLC(name,price){
  document.getElementById('ohlcStock').textContent=name;
  document.getElementById('ohlcO').textContent='₹'+(price*0.985).toFixed(2);
  document.getElementById('ohlcH').textContent='₹'+(price*1.01).toFixed(2);
  document.getElementById('ohlcL').textContent='₹'+(price*0.97).toFixed(2);
  document.getElementById('ohlcC').textContent='₹'+price.toFixed(2);
  document.getElementById('ohlcPopup').classList.add('show');
}
function openScanCrit(code,stockName){
  const sc=SCANNER_MAP[code]||{name:code};
  document.getElementById('scanTitle').textContent=sc.name;
  document.getElementById('scanStock').textContent=stockName+' — Why Selected';
  const crit=[{name:'VWAP',val:'Above (+1.2%)'},{name:'EMA 9',val:'Crossover ↑'},{name:'EMA 21',val:'Above'},{name:'RSI (14)',val:'62 — Bullish'},{name:'ADX',val:'28 — Strong'},{name:'Volume',val:'2.3x Average'},{name:'MACD',val:'Positive'},{name:'Support/Res',val:'At Support'}];
  document.getElementById('critList').innerHTML=crit.map(c=>`<div class="crit-row-in pass"><span class="crit-name-in">✅ ${c.name}</span><span class="crit-val-in">${c.val}</span></div>`).join('');
  document.getElementById('scanPopup').classList.add('show');
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function doLogout(){if(confirm('Logout करना है?')){window.location.href='page1_login.html';}}

// Live price update
setInterval(()=>{WL.forEach(s=>{s.price+=(Math.random()-0.5)*s.price*0.001;});renderWatchlist();},8000);

document.getElementById('navContainer').innerHTML=`<div class="bottom-nav"><a class="nav-item" href="page2_home.html"><div class="nav-icon">🏠</div><div class="nav-label">HOME</div></a><a class="nav-item" href="page3_signal.html"><div class="nav-icon">📡</div><div class="nav-label">SIGNAL</div></a><a class="nav-item" href="page4_power.html"><div class="nav-icon">⚡</div><div class="nav-label">POWER</div></a><a class="nav-item" href="page5_chart.html"><div class="nav-icon">📊</div><div class="nav-label">CHART</div></a><a class="nav-item active" href="page6_watchlist.html"><div class="nav-icon">⭐</div><div class="nav-label">WATCH</div></a><a class="nav-item" href="page7_admin.html"><div class="nav-icon">⚙️</div><div class="nav-label">ADMIN</div></a></div>`;
renderWatchlist();
</script>
</body>
</html>
