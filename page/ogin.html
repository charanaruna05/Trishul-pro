<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔱 Trishul Pro — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family:'Rajdhani',sans-serif; }
:root {
  --gold:#f5c518; --gold2:#c9a000;
  --bg:#000; --bg2:#0a0a0a; --bg3:#121212; --bg4:#1a1a1a;
  --border:#222; --bordergold:#3d3000;
  --text:#eee; --dim:#888;
  --green:#00c853; --red:#ff3d3d; --orange:#ff6d00; --blue:#1976d2;
}
html,body { height:100%; background:var(--bg); color:var(--text); overflow:hidden; }

.phone-frame {
  width:100%; max-width:430px; height:100vh; margin:0 auto;
  display:flex; flex-direction:column; background:var(--bg); position:relative;
  border-left:2px solid var(--gold); border-right:2px solid var(--gold);
  border-top:2px solid var(--gold); border-bottom:2px solid var(--gold);
  overflow:hidden;
}

/* LOGIN HEADER */
.login-header {
  flex-shrink:0; text-align:center; padding:20px 20px 12px;
  background:linear-gradient(180deg,rgba(245,197,24,0.08) 0%,transparent 100%);
  border-bottom:1px solid var(--bordergold);
}
.login-trishul { font-size:40px; display:inline-block; margin-bottom:4px; filter:drop-shadow(0 0 14px rgba(245,197,24,0.6)); animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.login-name { font-size:21px; font-weight:700; color:var(--gold); letter-spacing:3px; font-family:'Orbitron',sans-serif; }
.login-sub { font-size:9px; color:var(--dim); letter-spacing:2px; margin-top:3px; }

/* FORM */
.login-form { flex:1; padding:12px 16px 6px; display:flex; flex-direction:column; gap:8px; overflow-y:auto; scrollbar-width:none; }
.login-form::-webkit-scrollbar { display:none; }
.lf-label { font-size:10px; font-weight:700; color:var(--gold); letter-spacing:1.5px; margin-bottom:3px; display:block; }
.lf-wrap { position:relative; }
.lf-ico { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:13px; opacity:0.5; pointer-events:none; }
.lf-input { width:100%; background:var(--bg3); border:1px solid var(--bordergold); padding:10px 12px 10px 36px; color:var(--text); font-size:13px; outline:none; font-family:'Inter',sans-serif; }
.lf-input:focus { border-color:var(--gold); }
.lf-input::placeholder { color:var(--dim); }
.lf-select { width:100%; background:var(--bg3); border:1px solid var(--bordergold); padding:10px 36px 10px 36px; color:var(--text); font-size:13px; outline:none; cursor:pointer; appearance:none; -webkit-appearance:none; font-family:'Inter',sans-serif; }
.lf-arrow { position:absolute; right:11px; top:50%; transform:translateY(-50%); font-size:11px; color:var(--dim); pointer-events:none; }

.lf-btn { width:100%; background:linear-gradient(135deg,var(--gold2),var(--gold)); color:#000; border:none; padding:13px; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:2px; box-shadow:0 4px 18px rgba(245,197,24,0.22); }

.lf-divider { display:flex; align-items:center; gap:10px; }
.lf-dline { flex:1; height:1px; background:var(--border); }
.lf-dtxt { font-size:9px; color:var(--dim); letter-spacing:1px; white-space:nowrap; }

.lf-alt { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.lf-alt-btn { display:flex; align-items:center; justify-content:center; gap:7px; background:var(--bg3); border:1px solid var(--border); padding:10px; color:var(--text); font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; }

.lf-bio { display:flex; align-items:center; justify-content:center; gap:14px; background:var(--bg3); border:1px solid var(--bordergold); padding:10px 16px; cursor:pointer; }
.lf-bio-btn { width:46px; height:46px; background:var(--bg); border:2px solid var(--bordergold); display:flex; align-items:center; justify-content:center; font-size:22px; animation:bioPulse 2.5s ease-in-out infinite; }
@keyframes bioPulse { 0%,100%{box-shadow:0 0 0 0 rgba(245,197,24,0.3)} 50%{box-shadow:0 0 0 7px rgba(245,197,24,0)} }

.lf-panic { width:100%; background:linear-gradient(135deg,#8b0000,var(--red)); color:#fff; border:none; padding:12px; font-size:13px; font-weight:700; cursor:pointer; letter-spacing:2px; animation:panicPulse 2s ease-in-out infinite; }
@keyframes panicPulse { 0%,100%{box-shadow:0 4px 18px rgba(255,61,61,0.25)} 50%{box-shadow:0 4px 24px rgba(255,61,61,0.45)} }

/* FOOTER */
.login-footer { flex-shrink:0; text-align:center; padding:6px 20px 10px; border-top:1px solid var(--border); }
.lf-secure { display:flex; align-items:center; justify-content:center; gap:5px; font-size:9px; color:var(--dim); }
.sdot { width:5px; height:5px; background:var(--green); border-radius:50%; animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* LOADING */
.load-ov { position:fixed; inset:0; background:rgba(0,0,0,0.92); display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:9999; }
.load-ov.show { display:flex; }
.spinner { width:42px; height:42px; border:3px solid #222; border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.load-txt { font-family:'Orbitron',sans-serif; font-size:13px; color:var(--gold); letter-spacing:2px; }

.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--bg3); border:1px solid var(--bordergold); padding:8px 16px; font-size:11px; color:var(--text); z-index:9999; white-space:nowrap; display:none; }
.toast.show { display:block; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="login-header">
    <div class="login-trishul">🔱</div>
    <div class="login-name">MAA AADISHAKTI</div>
    <div class="login-sub">TRISHUL PRO · INDIAN MARKET · 2026</div>
  </div>

  <div class="login-form">
    <div>
      <label class="lf-label">FULL NAME</label>
      <div class="lf-wrap">
        <span class="lf-ico">👤</span>
        <input class="lf-input" type="text" id="fullName" placeholder="Enter your full name" value="Charan">
      </div>
    </div>
    <div>
      <label class="lf-label">PHONE</label>
      <div class="lf-wrap">
        <span class="lf-ico">📱</span>
        <input class="lf-input" type="tel" id="phone" placeholder="+91 XXXXX XXXXX" value="9800000000">
      </div>
    </div>
    <div>
      <label class="lf-label">EMAIL</label>
      <div class="lf-wrap">
        <span class="lf-ico">✉️</span>
        <input class="lf-input" type="email" id="email" placeholder="your@email.com" value="charan@trishul.ai">
      </div>
    </div>
    <div>
      <label class="lf-label">PASSWORD</label>
      <div class="lf-wrap">
        <span class="lf-ico">🔒</span>
        <input class="lf-input" type="password" id="password" placeholder="Enter password" value="demo123">
      </div>
    </div>
    <div>
      <label class="lf-label">BROKER</label>
      <div class="lf-wrap">
        <span class="lf-ico">🏦</span>
        <select class="lf-select" id="brokerSel">
          <option>Shoonya (Finvasia)</option>
          <option>Zerodha (Kite)</option>
          <option>Angel One</option>
          <option>Upstox</option>
          <option>Kotak Securities</option>
          <option>ICICI Direct</option>
          <option>HDFC Sky</option>
          <option>Dhan</option>
          <option>Motilal Oswal</option>
          <option>Groww</option>
        </select>
        <span class="lf-arrow">▼</span>
      </div>
    </div>
    <button class="lf-btn" onclick="doLogin()">🔱 LOGIN / REGISTER</button>
    <div class="lf-divider"><div class="lf-dline"></div><div class="lf-dtxt">OR</div><div class="lf-dline"></div></div>
    <div class="lf-alt">
      <button class="lf-alt-btn" onclick="doBio()">
        <svg width="14" height="14" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Gmail
      </button>
      <button class="lf-alt-btn" onclick="doBio()">👆 Biometric</button>
    </div>
    <div class="lf-bio" onclick="doBio()">
      <div class="lf-bio-btn">👆</div>
      <div>
        <div style="font-size:12px;font-weight:700">TOUCH TO UNLOCK</div>
        <div style="font-size:10px;color:var(--dim)">Fingerprint / Face ID</div>
      </div>
    </div>
    <button class="lf-panic" onclick="panicExit()">🚨 PANIC EXIT — सब CLOSE</button>
  </div>

  <div class="login-footer">
    <div class="lf-secure"><div class="sdot"></div><span>Biometric · TOTP · Broker · AWS Mumbai · Gemini AI</span></div>
  </div>
</div>

<div class="load-ov" id="loadOv">
  <div class="spinner"></div>
  <div class="load-txt" id="loadTxt">VERIFYING...</div>
</div>
<div class="toast" id="toast"></div>

<script>
function doLogin() {
  const name = document.getElementById('fullName').value.trim();
  if (!name) { toast('⚠️ Enter full name'); return; }
  showLoading('LAYER 1 — BIOMETRIC...');
  setTimeout(() => {
    showLoading('LAYER 2 — TOTP CHECK...');
    setTimeout(() => {
      showLoading('LAYER 3 — BROKER HANDSHAKE...');
      setTimeout(() => {
        hideLoading();
        sessionStorage.setItem('tp_user', name);
        sessionStorage.setItem('tp_broker', document.getElementById('brokerSel').value);
        window.location.href = 'page2_home.html';
      }, 700);
    }, 600);
  }, 600);
}
function doBio() {
  showLoading('🔐 BIOMETRIC SCAN...');
  setTimeout(() => {
    hideLoading();
    const name = document.getElementById('fullName').value.trim() || 'Charan';
    sessionStorage.setItem('tp_user', name);
    sessionStorage.setItem('tp_broker', document.getElementById('brokerSel').value || 'Shoonya');
    window.location.href = 'page2_home.html';
  }, 1000);
}
function panicExit() {
  if (confirm('🚨 PANIC EXIT — सभी positions close करेगा। Confirm?')) toast('🚨 All positions closed!');
}
function showLoading(t) { document.getElementById('loadTxt').textContent = t; document.getElementById('loadOv').classList.add('show'); }
function hideLoading() { document.getElementById('loadOv').classList.remove('show'); }
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
